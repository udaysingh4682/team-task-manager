services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: team_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/team_task_manager
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
